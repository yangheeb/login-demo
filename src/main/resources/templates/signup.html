<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Sign Up</title>
</head>
<body>
<h1>회원가입</h1>
<form th:action="@{/signup}" method="post">
    <div>
        <input type="text" name="username" placeholder="Username"/>
    </div>
    <div>
        <input type="password" name="password" placeholder="Password"/>
    </div>
    <div>
        <p>권한 선택</p>
        <label><input type="checkbox" name="authorities" value="ROLE_USER"/> 일반 사용자</label>
        <label><input type="checkbox" name="authorities" value="ROLE_ADMIN"/> 관리자</label>
        <label><input type="checkbox" name="authorities" value="ROLE_MANAGER"/> 매니저</label>
        <label><input type="checkbox" name="authorities" value="ROLE_VIEWER"/> 뷰어</label>
    </div>
    <input type="submit" value="회원가입"/>
</form>
<p>이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a></p>
</body>
</html>
